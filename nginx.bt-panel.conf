# XingTone后端 - Nginx 反向代理配置（宝塔面板优化版）
# ============================================================
# 适用场景：宝塔面板 + Nginx + NestJS 后端（端口 3000）
# 使用方法：
#   1. 宝塔面板 → 网站 → 添加站点（纯静态）
#   2. 站点设置 → 配置文件 → 清空后粘贴本配置
#   3. 搜索「请修改」字样，替换为你自己的配置
#   4. 保存即可
# ============================================================

# ==================== 上游服务配置 ====================
upstream xtmusic_backend {
    server 127.0.0.1:3000;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ==================== gzip 压缩 ====================
# ⚠️ 宝塔面板主配置中已开启 gzip，此处默认注释，避免重复报错
# 如需自定义压缩级别/类型，可取消注释，但需先在宝塔主配置中关闭 gzip
# gzip on;
# gzip_min_length 1k;
# gzip_comp_level 6;
# gzip_buffers 16 8k;
# gzip_http_version 1.1;
# gzip_types
#     text/plain
#     text/css
#     application/json
#     application/javascript
#     text/xml
#     application/xml
#     application/xml+rss
#     text/javascript
#     image/svg+xml
#     font/truetype
#     font/opentype
#     application/vnd.ms-fontobject
#     image/x-icon;
# gzip_vary on;
# gzip_proxied any;
# gzip_disable "MSIE [1-6]\.";

# ==================== HTTP → HTTPS 跳转 ====================
server {
    listen 80;
    # ====== 【请修改】替换为你的 API 域名 ======
    server_name api.example.com;

    # 健康检查保留在 80 端口，便于负载均衡探活
    location = /api/health {
        proxy_pass http://xtmusic_backend;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ==================== HTTPS 主站点 ====================
server {
    listen 443 ssl http2;
    # ====== 【请修改】替换为你的 API 域名 ======
    server_name xtmusicapi.chikuu.top;

    # ----- SSL 证书（宝塔默认路径，把域名改成你的）-----
    # ====== 【请修改】把 api.example.com 改成你的域名 ======
    ssl_certificate    /www/server/panel/vhost/cert/xtmusicapi.chikuu.top/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/xtmusicapi.chikuu.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets on;

    # ----- 安全响应头（Nginx 统一输出，后端 Helmet 可关闭部分）-----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----- 客户端上传体积限制（歌曲/封面等）-----
    client_max_body_size 100m;
    client_body_buffer_size 128k;

    # ----- 接口反向代理到 NestJS（端口 3000）-----
    location /api/ {
        # ---- 代理基础配置 ----
        proxy_pass http://xtmusic_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";

        # ---- 超时配置 ----
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # ---- 缓冲配置（提升性能）----
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        proxy_temp_file_write_size 64k;

        # ---- CORS 跨域处理（Nginx 层直接处理预检请求）----
        # 启用后请在后端 .env 中设置 CORS_ENABLED=false，避免重复设置
        # 取消下面注释即可启用，并修改域名白名单：
        #
        # set $cors "";
        # if ($http_origin ~* "^https://(www\.|admin\.)?example\.com$") {
        #     set $cors "true";
        # }
        # if ($http_origin ~* "^http://localhost:") {
        #     set $cors "true";
        # }
        #
        # if ($request_method = 'OPTIONS') {
        #     set $cors "${cors}options";
        # }
        #
        # if ($cors = "trueoptions") {
        #     add_header Access-Control-Allow-Origin $http_origin always;
        #     add_header Access-Control-Allow-Credentials "true" always;
        #     add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        #     add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        #     add_header Access-Control-Max-Age "86400" always;
        #     return 204;
        # }
        #
        # if ($cors = "true") {
        #     add_header Access-Control-Allow-Origin $http_origin always;
        #     add_header Access-Control-Allow-Credentials "true" always;
        #     add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
        # }

        # ---- WebSocket 支持（如需要）----
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
    }

    # ----- 本地上传文件静态资源 -----
    location /uploads/ {
        # ====== 【请修改】替换为你的上传文件目录绝对路径 ======
        alias /www/wwwroot/xtmusic/uploads/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, no-transform";

        # CORS：允许跨域访问（前端/管理后台在不同域名时需要）
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS, HEAD" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

        # 支持 range 请求（音频拖动进度条必须）
        # Nginx 默认已支持，无需额外配置，
        # 但需要确保 gzip 不对音频文件启用（已在主配置限制）
    }

    # ----- 健康检查 -----
    location = /api/health {
        proxy_pass http://xtmusic_backend;
        access_log off;
    }

    # ----- 根路径：探针页面 -----
    location / {
        default_type text/plain;
        return 200 "XingTone Music API Server is running\n";
    }

    # ----- 错误页 -----
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        default_type text/plain;
        return 502 "Server Error\n";
    }
}

# ============================================================
# 【需要修改的地方汇总】搜索「请修改」可快速定位
# ============================================================
# 1. server_name 两处 → 你的 API 域名（如 api.xtmusic.com）
# 2. ssl_certificate / ssl_certificate_key → 宝塔证书路径（把域名改成你的）
# 3. alias /www/wwwroot/xtmusic/uploads/ → 上传文件目录
# 4. 如需 Nginx 层 CORS：取消注释并修改域名白名单
# ============================================================
