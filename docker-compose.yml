# XingTone后端 - Docker Compose 编排
# 使用：docker compose up -d
# 数据库：SQLite（文件式，存储在 volumes 中）
services:
  # NestJS 后端服务（Node 20）
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xtmusic-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "file:./data/dev.db"
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-xt-music-change-this-secret-in-production}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      LOCAL_STORAGE_PATH: /app/uploads
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      TZ: Asia/Shanghai
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - db_data:/app/prisma/data

volumes:
  uploads_data:
  logs_data:
  db_data:
