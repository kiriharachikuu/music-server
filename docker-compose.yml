# XingTone后端 - Docker Compose 编排
# 使用：docker compose up -d
services:
  # PostgreSQL 15 数据库
  postgres:
    image: postgres:15
    container_name: xtmusic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xt_music
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xt_music"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS 后端服务（Node 20）
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xtmusic-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/xt_music?schema=public"
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-xt-music-change-this-secret-in-production}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      LOCAL_STORAGE_PATH: /app/uploads
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      TZ: Asia/Shanghai
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs

volumes:
  postgres_data:
  uploads_data:
  logs_data:
