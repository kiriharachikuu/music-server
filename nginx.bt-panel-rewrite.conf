# ============================================================
# 宝塔面板 - 伪静态补充规则
# 适用场景：已使用宝塔「反向代理」功能添加了基础反代
#           需要补充 CORS、静态资源、安全头等配置
# 使用方法：网站设置 → 伪静态 → 粘贴以下内容
# ============================================================

# ----- gzip 压缩 -----
# ⚠️ 宝塔面板主配置中已开启 gzip，此处默认注释，避免重复报错
# 如需自定义压缩级别/类型，可取消注释，但需先在宝塔主配置中关闭 gzip
# gzip on;
# gzip_min_length 1k;
# gzip_comp_level 6;
# gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
# gzip_vary on;

# ----- 安全响应头 -----
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ----- 上传文件大小限制（需 ≥ 后端 UPLOAD_MAX_SIZE_AUDIO_MB，否则大音频上传会被截断返回 413）-----
client_max_body_size 220m;

# ----- 本地上传文件静态资源（如反代未覆盖）-----
location /uploads/ {
    alias /www/wwwroot/xtmusic/uploads/;
    expires 30d;
    access_log off;
    add_header Cache-Control "public, no-transform";
    add_header Access-Control-Allow-Origin "*" always;

    # 拒绝 SVG 访问：SVG 可内嵌 <script>，直接访问 URL 会触发存储型 XSS
    # （后端已禁止 SVG 上传，此规则用于拦截历史遗留 SVG 文件）
    location ~* \.svg$ {
        return 403;
    }

    # 防盗链：仅允许本站与白名单域名引用资源，其他来源返回 403
    # none：无 referer（PWA/直接访问）允许；blocked：refer 被删允许；server_names：同源允许
    # 【请修改】下方白名单替换为你的前端/管理后台域名
    valid_referers none blocked server_names
        *.chikuu.top;  # 【请修改】前端/管理后台域名
    if ($invalid_referer) {
        return 403;
    }
}

# ----- 健康检查 -----
location = /api/health {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    access_log off;
}

